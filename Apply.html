<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply – Hot Beans</title>

  <!-- YOUR CSS -->
  <link rel="stylesheet" href="mystyle.css">

  <!-- Bootstrap Grid -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap-grid.min.css" rel="stylesheet">

  <style>
    .apply-container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .apply-card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .apply-header {
      background: #b45353;
      color: white;
      padding: 25px;
      text-align: center;
    }

    .apply-header h1 {
      margin: 0;
      font-size: 1.8rem;
    }

    .apply-body {
      padding: 25px;
    }

    .form-row {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .form-group {
      flex: 1;
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 5px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 0.9rem;
    }

    .submit-btn {
      width: 100%;
      margin-top: 10px;
    }

    .success-message {
      display: none;
      text-align: center;
      color: green;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<!-- ✅ SAME NAVBAR -->
<nav class="navbar">
  <div class="logo">
    <span class="logo-word">Hot</span>
    <span class="logo-word">Beans</span>
  </div>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="jobs.html">Job List</a></li>
    <li><a href="teams.html">Teams</a></li>
    <li><a href="About.html">About</a></li>
    <li><a href="apply.html" class="active">Apply Now</a></li>
  </ul>
</nav>

<!-- APPLY FORM -->
<div class="apply-container">

  <div class="apply-card">

    <div class="apply-header">
      <h1>Apply for a Role</h1>
    </div>

    <div class="apply-body">

      <form id="applyForm">

        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" required>
          </div>

          <div class="form-group">
            <label>Last Name</label>
            <input type="text" required>
          </div>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" required>
        </div>

        <div class="form-group">
          <label>Role Applying For</label>
          <select required>
            <option value="">Select a role</option>
            <option>Front-End Developer</option>
            <option>Back-End Developer</option>
            <option>Full Stack Developer</option>
            <option>Cyber Security Analyst</option>
            <option>Data Analyst</option>
            <option>UI/UX Designer</option>
          </select>
        </div>

        <div class="form-group">
          <label>Upload CV (optional)</label>
          <input type="file">
        </div>

        <div class="form-group">
          <label>Why should we hire you?</label>
          <textarea rows="4"></textarea>
        </div>

        <button type="submit" class="btn primary-btn submit-btn">
          Submit Application
        </button>

        <div class="success-message" id="successMessage">
          ✅ Application submitted successfully!
        </div>

      </form>

    </div>

  </div>

</div>

<!-- FORM SCRIPT -->
<script>
  const form = document.getElementById("applyForm");
  const message = document.getElementById("successMessage");

  form.addEventListener("submit", function(e) {
    e.preventDefault();
    message.style.display = "block";
    form.reset();
  });
</script>

</body>
</html>
